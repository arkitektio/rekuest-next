query GetAgent($id: ID!) {
  agent(id: $id) {
    ...Agent
  }
}


query ListAgents($filters: AgentFilter, $pagination: OffsetPaginationInput) {
  agents(filters: $filters, pagination: $pagination) {
    ...Agent
  }
}


query GetAgentByIdentifiers($app: String!, $version: String, $deviceId: String, $instanceId: String) {
  agent(app: $app, version: $version, deviceId: $deviceId, instanceId: $instanceId) {
    ...Agent
  }
}

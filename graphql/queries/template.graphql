
query SearchImplementations($search: String, $values: [ID!]) {
  options: implementations(
    filters: { interface: { iContains: $search }, ids: $values }
    pagination: { limit: 10 }
  ) {
    label: name
    value: id
  }
}

query ImplementationsFor($hash: ActionHash!) {
  implementations(filters: { actionHash: $hash }) {
    ...Implementation
  }
}

query MyImplementationAt($interface: String, $actionId: ID) {
  myImplementationAt(
    interface: $interface
    actionId: $actionId
  ) {
    ...Implementation
  }
}

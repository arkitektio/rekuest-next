query find(
  $id: ID
  $implementation: ID
  $hash: ActionHash
  $matching: ActionDependencyInput
) {
  action(
    id: $id
    implementation: $implementation
    hash: $hash
    matching: $matching
  ) {
    ...Action
  }
}

query retrieveall {
  actions {
    ...Action
  }
}

query SearchActions($search: String, $values: [ID!]) {
  options: actions(
    filters: { name: { iContains: $search }, ids: $values }
    pagination: { limit: 10 }
  ) {
    label: name
    value: id
  }
}

query ListActions($filters: ActionFilter, $pagination: OffsetPaginationInput) {
  actions(filters: $filters, pagination: $pagination) {
    ...ListAction
  }
}

query PrimaryActions(
  $pagination: OffsetPaginationInput
  $identifier: String
  $ordering: [ActionOrder!]
  $search: String
) {
  actions(
    ordering: $ordering
    pagination: $pagination
    filters: {
      demands: [
        {
          kind: ARGS
          matches: [{ at: 0, kind: STRUCTURE, identifier: $identifier }]
        }
      ]
      search: $search
    }
  ) {
    ...PrimaryAction
  }
}

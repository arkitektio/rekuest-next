query GetTestCase($id: ID!) {
  testCase(id: $id) {
    ...TestCase
  }
}

query GetTestResult($id: ID!) {
  testResult(id: $id) {
    ...TestResult
  }
}

query SearchTestCases($search: String, $values: [ID!]) {
  options: testCases(
    filters: { name: { iContains: $search }, ids: $values }
    pagination: { limit: 10 }
  ) {
    label: name
    value: id
  }
}

query SearchTestResults($search: String, $values: [ID!]) {
  options: testResults(
    filters: { name: { iContains: $search }, ids: $values }
    pagination: { limit: 10 }
  ) {
    label: createdAt
    value: id
  }
}

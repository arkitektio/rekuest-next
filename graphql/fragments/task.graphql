fragment Task on Task {
  args
  id
  parent {
    id
  }
  id
  latestEventKind
  events(ordering: [{createdAt: ASC}]) {
    id
    returns
    level
  }
  instructs {
    id
  }
  reference
  updatedAt
}

fragment TaskEvent on TaskEvent {
  id
  kind
  returns
  reference
  message
  progress
}

fragment TaskChangeEvent on TaskChangeEvent {
  create {
    ...Task
  }
  event {
    ...TaskEvent
  }
}

fragment Definition on Action {
  args {
    ...ArgPort
  }
  returns {
    ...ReturnPort
  }
  kind
  name
  description
  interfaces
  collections {
    name
  }
  isDev
  isTestFor {
    id
  }
  portGroups {
    key
  }
  stateful
}

fragment Action on Action {
  hash
  id
  ...Definition
}

fragment PrimaryAction on Action {
  name
  id
  hash
  description
}

fragment ListAction on Action {
  id
  name
  description
  args {
    ...ArgPort
  }
  returns {
    ...ReturnPort
  }
  stateful
}

fragment ArgChildPortNested on ArgPort {
  key
  kind
  children {
    key
    identifier
    nullable
    kind
  }
  choices {
    value
    label
    description
  }
  identifier
  nullable
  default
}

fragment ArgChildPort on ArgPort {
  key
  kind
  identifier
  children {
    ...ArgChildPortNested
  }
  choices {
    value
    label
    description
  }
  nullable
  default
}


fragment ReturnChildPortNested on ReturnPort {
  key
  kind
  children {
    key
    identifier
    nullable
    kind
  }
  choices {
    value
    label
    description
  }
  identifier
  nullable
  default
}

fragment ReturnChildPort on ReturnPort {
  key
  kind
  identifier
  children {
    ...ReturnChildPortNested
  }
  choices {
    value
    label
    description
  }
  nullable
  default
}

fragment CustomEffect on CustomEffect {
  __typename
  kind
  hook
  ward
}

fragment MessageEffect on MessageEffect {
  __typename
  kind
  message
}

fragment PortEffect on Effect {
  __typename
  kind
  dependencies
  function
  ...CustomEffect
  ...MessageEffect
}

fragment StringAssignWidget on StringAssignWidget {
  __typename
  kind
  placeholder
  asParagraph
}

fragment SliderAssignWidget on SliderAssignWidget {
  __typename
  kind
  min
  max
  step
}

fragment SearchAssignWidget on SearchAssignWidget {
  __typename
  kind
  query
  ward
  dependencies
}

fragment CustomAssignWidget on CustomAssignWidget {
  __typename
  ward
  hook
}

fragment ChoiceAssignWidget on ChoiceAssignWidget {
  __typename
  kind
  choices {
    value
    label
    description
  }
}

fragment PortAssignWidget on AssignWidget {
  __typename
  kind
  ...StringAssignWidget
  ...SearchAssignWidget
  ...SliderAssignWidget
  ...ChoiceAssignWidget
  ...CustomAssignWidget
}

fragment CustomReturnWidget on CustomReturnWidget {
  __typename
  kind
  hook
  ward
}

fragment ChoiceReturnWidget on ChoiceReturnWidget {
  __typename
  choices {
    label
    value
    description
  }
}

fragment ReturnWidget on ReturnWidget {
  __typename
  kind
  ...CustomReturnWidget
  ...ChoiceReturnWidget
}

fragment ArgPort on ArgPort {
  __typename
  key
  label
  nullable
  description
  default
  kind
  identifier
  children {
    ...ArgChildPort
  }
  widget {
    ...PortAssignWidget
  }
  choices {
    value
    label
    description
  }
  validators {
    function
    errorMessage
    dependencies
    label
  }
  effects {
    ...PortEffect
  }
}


fragment ReturnPort on ReturnPort {
  __typename
  key
  label
  nullable
  description
  default
  kind
  identifier
  children {
    ...ReturnChildPort
  }
  widget {
    ...ReturnWidget
  }
  choices {
    value
    label
    description
  }
  effects {
    ...PortEffect
  }
}
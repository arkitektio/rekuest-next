name: Integration Tests
on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
jobs:
  test_integration:
    # Test prerelease branches against the prerelease backend (:next) and the
    # stable line against :latest. base_ref is set on PRs, ref_name on pushes.
    env:
      REKUEST_SERVICE_TAG: ${{ (github.base_ref || github.ref_name) == 'main' && 'latest' || 'next' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -m integration
